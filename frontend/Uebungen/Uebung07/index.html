<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Übung 07</title>
    <link rel="preload" href="style.css" as="style" />
    <link rel="preload" href="script.js" as="script" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet preload" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container-fluid">

        <header class="row" id="header">
            <div class="col-12 text-center py-3">
                <h1>Übung 7 <small class="smallertext">- "Schleppen & Abwerfen"</small></h1>
            </div>
        </header>

        <section class="row justify-content-center" id="content">
            <main class="col-12 col-md-8 p-3">
                <div class="content-item">
                    <h2>Willkommen!</h2>
                    <p id="Willkommen">Hallo Welt!</p>
                </div>
                <div class="content-item">
                    <p>
                        Ziehe die Bilder ins Ziel-Feld:
                    </p>
                    <div id="start" ondrop="drop(event)" ondragover="allowDrop(event)">
                        <img id="drag1" class="dragimg" src="../../assets/img/Kanada3.webp" alt="Lake Louis" draggable="false" ondragstart="drag(event)">
                        <img id="drag2" class="dragimg" src="../../assets/img/Kanada4.webp" alt="Bär" draggable="true" ondragstart="drag(event)">
                        <img id="drag3" class="dragimg" src="../../assets/img/Kanada5.webp" alt="Elch" draggable="true" ondragstart="drag(event)">
                    </div>
                    <div id="ziel" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                </div>

                <div class="content-item">
                    <h2>Aufgabentool</h2>
                    <div class="row">
                        <div class="col-md">
                            <h3 class="row">ToDo</h3>
                            <div id="Todo" class="row aufgabenSpalte" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                        </div>
                        <div class="col-md">
                            <h3 class="row">WIP</h3>
                            <div id="WIP" class="row aufgabenSpalte" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                        </div>
                        <div class="col-md">
                            <h3 class="row">Done</h3>
                            <div id="Done" class="row aufgabenSpalte" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                        </div>
                        <div class="col-md">
                            <h3 class="row">Trash</h3>
                            <div id="Trash" class="row aufgabenSpalte" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                            <button class="btn btn-sm btn-danger" onclick="deleteTasks()">Löschen</button>
                        </div>
                    </div>
                    <p>
                        Erstelle eine Aufgabe:
                    </p>
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#aufgabenModal">
                        Aufgabe erstellen
                    </button>
                </div>

            </main>
        </section>

        <footer class="row" id="footer">
            <div class="col-12 text-center py-2 d-flex justify-content-center">
                <p>
                    Kontakt: <a href="mailto:paul.thomasius@stud.htwk-leipzig.de">Paul Thomasius</a>
                </p>
            </div>
        </footer>
    </div>

    <div class="modal fade" id="aufgabenModal" tabindex="-1" aria-labelledby="aufgabenModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="aufgabenModalLabel">Aufgabe erstellen</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>
                        <label>Wähle eine Farbe!</label>
                        <br>
                        <input type="color" id="aufgabenFarbe" class="form-control" name="AufgabenFarbe">
                    </p>
                    <p>
                        <label>Aufgabe:</label>
                        <br>
                        <input type="text" id="aufgabenText" class="form-control" name="AufgabenText">
                    </p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="createTask()">Erstellen</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>
</body>
</html>
